---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bifrost
spec:
  chartRef:
    kind: OCIRepository
    name: bifrost
  interval: 1h
  values:
    image:
      repository: mirror.gcr.io/maximhq/bifrost
      tag: 2.1.28@sha256:cd96e814408af13df8b6ab134d53e50a47cce54bc7ab4be266dfd61b5bae21f0
    podSecurityContext:
      runAsUser: 1000
    storage:
      mode: sqlite
      persistence:
        enabled: true
        existingClaim: bifrost
    vectorStore:
      enabled: true
      type: redis
      redis:
        enabled: false
        external:
          enabled: true
          host: "bifrost-dragonfly.ai.svc.cluster.local"
          port: 6379
    bifrost:
      host: "::"
      authConfig:
        isEnabled: true
        existingSecret: bifrost
        usernameKey: BIFROST_ADMIN_USERNAME
        passwordKey: BIFROST_ADMIN_PASSWORD
      encryptionKeySecret:
        name: bifrost
        key: BIFROST_ENCRYPTION_KEY
      client:
        enforceAuthOnInference: true
        logRetentionDays: 30
