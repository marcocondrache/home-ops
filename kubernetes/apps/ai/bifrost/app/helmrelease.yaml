---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bifrost
spec:
  chartRef:
    kind: OCIRepository
    name: bifrost
  interval: 1h
  values:
    image:
      repository: mirror.gcr.io/maximhq/bifrost
      tag: v1.6.4@sha256:5f1fed63b5c2c78c51f25d80d5d2d683d79f74587ea0906e8c03fbd256ab52e0
    podSecurityContext:
      runAsUser: 1000
    storage:
      mode: sqlite
      persistence:
        enabled: true
        existingClaim: bifrost
    vectorStore:
      enabled: true
      type: redis
      redis:
        enabled: false
        external:
          enabled: true
          host: "bifrost-dragonfly.ai.svc.cluster.local"
          port: 6379
    bifrost:
      host: "::"
      authConfig:
        isEnabled: true
        existingSecret: bifrost-secret
        usernameKey: BIFROST_ADMIN_USERNAME
        passwordKey: BIFROST_ADMIN_PASSWORD
      encryptionKeySecret:
        name: bifrost-secret
        key: BIFROST_ENCRYPTION_KEY
      client:
        enforceAuthOnInference: true
        logRetentionDays: 30
