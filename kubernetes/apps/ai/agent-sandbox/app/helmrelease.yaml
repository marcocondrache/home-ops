---
# yaml-language-server: $schema=https://k8s-schemas-jnobrega.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agent-sandbox
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: agent-sandbox
  values:
    namespace:
      create: false
      name: ai
    image:
      # renovate: datasource=docker depName=registry.k8s.io/agent-sandbox/agent-sandbox-controller
      tag: v0.5.2
    controller:
      extensions: true
