---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kagent.dev/agentharness_v1alpha2.json
apiVersion: kagent.dev/v1alpha2
kind: AgentHarness
metadata:
  name: openclaw
spec:
  # backend selects the agent; runtime defaults to openshell (our gateway).
  backend: openclaw
  runtime: openshell
  description: OpenClaw agent running on the in-cluster OpenShell gateway.
  modelConfigRef: default-model-config
  # ponytail: network unset = backend default-deny egress; add allowedDomains when the agent needs outbound access.
