---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/model_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen3-embedding-0.6b
spec:
  format: gguf
  quantization: Q8_0
  source: https://huggingface.co/Qwen/Qwen3-Embedding-0.6B-GGUF/resolve/main/Qwen3-Embedding-0.6B-Q8_0.gguf
  hardware:
    accelerator: cpu
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/inference.llmkube.dev/inferenceservice_v1alpha1.json
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen3-embedding-0.6b
spec:
  modelRef: qwen3-embedding-0.6b
  runtime: llamacpp
  image: ghcr.io/ggml-org/llama.cpp:server-b9982@sha256:ae4883b4bf0814bfe44cb8b4cdc5208412f61599200fb8482a96935cdacc184e
  replicas: 1
  contextSize: 8192
  parallelSlots: 2
  batchSize: 8192
  uBatchSize: 4096
  resources:
    cpu: "2"
    memory: 2Gi
  extraArgs:
    # qwen3-Embedding uses last-token pooling with left padding;
    # --embedding + --pooling last exposes the OpenAI-compatible
    # /v1/embeddings endpoint.
    - --embedding
    - --pooling
    - last
    - --cache-ram
    - "0"
    - --no-mmap
    - --sleep-idle-seconds
    - "300"
    - --alias
    - qwen3-embedding-0.6b
    - --metrics
  endpoint:
    port: 8080
    type: ClusterIP
  probeOverrides:
    startup:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 60
    liveness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      httpGet:
        path: /health
        port: 8080
      periodSeconds: 10
      failureThreshold: 3
