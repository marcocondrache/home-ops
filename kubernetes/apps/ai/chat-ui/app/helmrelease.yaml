---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chat-ui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: chat-ui
  values:
    controllers:
      chat-ui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/huggingface/chat-ui-db
              tag: 0.20.0@sha256:42f28a74d8333353eefd8691de95dda0925ce359725d67128082ef76fa59cd3a
            env:
              TZ: Europe/Rome
              PORT: &port 3000
              # ponytail: chat-ui-db bundles mongod at localhost; MONGODB_URL is
              # preset in the image, only the OpenAI-compatible endpoint is wired up.
              OPENAI_BASE_URL: http://litellm.ai.svc.cluster.local:4000/v1
              OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm
                    key: LITELLM_MASTER_KEY
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - chat-ui.labx.sh
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data/db
