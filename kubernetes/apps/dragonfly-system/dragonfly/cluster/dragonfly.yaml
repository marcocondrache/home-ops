---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0
  replicas: 1
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  # ponytail: no --cluster_mode — standalone keeps the 16 logical DBs + SELECT that apps use to share this instance. Cluster mode would force db0 only.
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=2
  resources:
    requests:
      cpu: 25m
    limits:
      memory: 1Gi
