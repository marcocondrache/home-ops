---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  chartRef:
    kind: OCIRepository
    name: cilium
  interval: 1h
  values:
    ipam:
      mode: kubernetes

    k8s:
      requireIPv4PodCIDR: true
      requireIPv6PodCIDR: true

    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445

    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256

    ipv4NativeRoutingCIDR: 10.42.0.0/16
    ipv6NativeRoutingCIDR: fdf3:0f3a:242e:42::/108

    routingMode: native
    devices: bond+

    autoDirectNodeRoutes: true

    cni:
      exclusive: false

    cgroup:
      automount:
        enabled: false
      hostRoot: /sys/fs/cgroup

    l2announcements:
      enabled: false

    endpointRoutes:
      enabled: true

    loadBalancer:
      mode: dsr
      algorithm: maglev

    rollOutCiliumPods: true

    bandwidthManager:
      enabled: true
      bbr: true

    envoy:
      enabled: false

    localRedirectPolicies:
      enabled: true

    dashboards:
      enabled: true

    operator:
      replicas: 1
      rollOutPods: true
      dashboards:
        enabled: true
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true

    bpfClockProbe: true

    pmtuDiscovery:
      enabled: true

    bgpControlPlane:
      enabled: true

    bpf:
      masquerade: true
      datapathMode: netkit
      preallocateMaps: true

    ipv4:
      enabled: true
    ipv6:
      enabled: true

    enableIPv4BIGTCP: true
    enableIPv6BIGTCP: true

    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true

    hubble:
      enabled: false

    socketLB:
      enabled: true
      hostNamespaceOnly: true

    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
