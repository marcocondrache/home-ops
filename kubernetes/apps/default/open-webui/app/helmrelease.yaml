---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui
  interval: 30m
  values:
    image:
      tag: v0.10.2@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
      useSlim: true
    ollama:
      enabled: false
    pipelines:
      enabled: false
    enableOpenaiApi: false
    websocket:
      enabled: false
    extraEnvVars:
      ENABLE_SIGNUP: false
      RAG_WEB_SEARCH_ENGINE: searxng
      SEARXNG_QUERY_URL: http://searxng.default.svc.cluster.local:8080/search?q=<query>
    extraEnvFrom:
      - secretRef:
          name: open-webui-secret
    resources:
      requests:
        cpu: 100m
      limits:
        memory: 2Gi
    persistence:
      enabled: true
      existingClaim: open-webui
    route:
      enabled: true
      hostnames:
        - chat.labx.sh
      parentRefs:
        - name: envoy-internal
          namespace: network
