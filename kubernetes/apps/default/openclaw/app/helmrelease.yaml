---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: openclaw
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.3.1@sha256:dcf11a3a97a9b0e42dd41fcd4891533e77ff72e7b0380c743177bfbfd6f38b2d
            command:
              - node
              - dist/index.js
              - config
              - set
              - --batch-json
              - >-
                [{"path":"gateway.mode","value":"local"},
                {"path":"gateway.bind","value":"lan"},
                {"path":"gateway.controlUi.allowedOrigins","value":["https://openclaw.labx.sh"]}]
            env:
              HOME: /home/node
              OPENCLAW_HOME: /home/node
              OPENCLAW_STATE_DIR: /home/node/.openclaw
              OPENCLAW_CONFIG_DIR: /home/node/.openclaw
              OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.3.1@sha256:dcf11a3a97a9b0e42dd41fcd4891533e77ff72e7b0380c743177bfbfd6f38b2d
            command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
            env:
              TZ: Europe/Rome
              HOME: /home/node
              OPENCLAW_HOME: /home/node
              OPENCLAW_STATE_DIR: /home/node/.openclaw
              OPENCLAW_CONFIG_DIR: /home/node/.openclaw
              OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
              OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
              OPENCLAW_GATEWAY_PORT: &port 18789
              OPENCLAW_GATEWAY_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: "{{ .Release.Name }}-secret"
                    key: OPENCLAW_GATEWAY_TOKEN
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - openclaw.labx.sh
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /home/node/.openclaw
