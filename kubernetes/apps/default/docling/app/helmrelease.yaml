---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: docling
spec:
  chartRef:
    kind: OCIRepository
    name: docling
  interval: 1h
  values:
    controllers:
      docling:
        containers:
          app:
            image:
              repository: ghcr.io/marcocondrache/docling-serve-rocm
              tag: 1.26.0@sha256:0ac39ce692374b6ec9942f0b899e57b9428a6d673a3af35bf457cce68397bc09
            env:
              TZ: Europe/Rome
              OMP_NUM_THREADS: 8
              HSA_OVERRIDE_GFX_VERSION: 11.0.0
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 5001
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              claims:
                - name: gpu
              requests:
                memory: 2Gi
              limits:
                memory: 4Gi
    defaultPodOptions:
      resourceClaims:
        - name: gpu
          resourceClaimName: shared
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      run:
        type: emptyDir
        medium: Memory
        sizeLimit: 16Mi
      tmp:
        type: emptyDir
