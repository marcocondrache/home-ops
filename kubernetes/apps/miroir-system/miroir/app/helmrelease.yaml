---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miroir
spec:
  chartRef:
    kind: OCIRepository
    name: miroir
  interval: 1h
  values:
    replicaCount: 2
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      podMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    nodes:
      alpha:
        pools:
          default:
            backend: lvmthin
            device: /dev/disk/by-partlabel/r-miroir
      gamma:
        pools:
          default:
            backend: lvmthin
            device: /dev/disk/by-partlabel/r-miroir
    storageClasses:
      - name: miroir-local
        isDefault: false
      - name: miroir-replicated
        isDefault: false
        quorum: freeze
        replicas: 2
    volumeSnapshotClasses:
      - name: miroir-snap
