---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: lan-icmp
spec:
  module: icmp
  prober:
    url: blackbox-exporter-lan.o11y.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - nas.labx.internal
        - alpha.labx.internal
        - gamma.labx.internal
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter-lan
      action: replace
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: lan-nfs
spec:
  jobName: nfs_probe
  module: tcp_connect
  prober:
    url: blackbox-exporter-lan.o11y.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - nas.labx.internal:2049
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter-lan
      action: replace
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/probe_v1.json
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: lan-zigbee
spec:
  jobName: zigbee_probe
  module: icmp
  prober:
    url: blackbox-exporter-lan.o11y.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - zigbee.controllers.internal
  metricRelabelings:
    - targetLabel: service
      replacement: blackbox-exporter-lan
      action: replace
